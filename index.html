<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미래에셋생명 문서자동화 워크북</title>
    <!-- Pretendard 웹폰트 — Windows/macOS/Linux 모든 OS 에서 동일한 한국어 렌더링 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />
    <!-- JetBrains Mono — 코드/터미널 모노스페이스 (Windows Courier 폴백 방지) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
    <style>
      :root {
        --workbook-font: "Pretendard Variable", Pretendard,
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Malgun Gothic", "맑은 고딕", "Noto Sans KR", "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        --workbook-mono: "JetBrains Mono", "Fira Code", "Cascadia Code",
          "Source Code Pro", Menlo, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      /* 강제 — 모든 노드에 cascade. inline style 의 fontFamily 가 와도
         최상위 루트가 var() 로 정의돼 있어서 자식이 inherit 받는다. */
      html, body, #root, button, input, textarea, select {
        font-family: var(--workbook-font);
      }
      code, pre, kbd, samp, tt {
        font-family: var(--workbook-mono);
      }
      body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
