# Mirae Workbook tmux 설정
set -g history-limit 50000
set -g default-terminal "xterm-256color"
set -g status off
set -g mouse on
# 홈 디렉토리에서 시작
set -g default-command "exec bash --login"
# 터미널 출력을 자동으로 파일에 기록 — 채점 시 활용
set-hook -g after-new-session "pipe-pane 'cat >> #{pane_current_path}/.terminal-output.txt'"
